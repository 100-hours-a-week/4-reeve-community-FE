x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nodejs:
    image: reeve-fe:${FE_IMAGE_TAG}
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL}
    ports:
      - "3000:3000"
    networks:
      - reeve-fe-net
    logging: *default-logging

networks:
  reeve-fe-net:
    driver: bridge
